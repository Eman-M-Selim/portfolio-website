<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV | Eman Selim</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/cv.css" />
  </head>
  <body class="standalone-page cv-body">
    <a class="skip-link" href="#cv-root">Skip to main content</a>
    <div class="background-layer" aria-hidden="true"></div>

    <header class="site-header cv-header-shell" id="top">
      <nav class="main-navbar" aria-label="CV navigation">

        <div class="standalone-links">

        </div>

        <div class="navbar-actions">
          <button class="lang-switch" id="language-toggle" type="button" aria-label="Language switch">EN</button>
          <button class="icon-button" id="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
            <i class="bi bi-moon-stars-fill" aria-hidden="true"></i>
          </button>

      </nav>
    </header>

    <main class="cv-page" id="cv-root">

      <div class="cv-actions" id="cv-actions">
        <a class="button button-secondary" href="./index.html" id="cv-back-button">Back to Portfolio</a>
        <button class="button button-primary" type="button" id="cv-download-button">Download PDF</button>

    <footer class="site-footer cv-footer-shell">
      <p>Eman Selim</p>
      <p>© 2026 Eman Selim. All rights reserved.</p>
